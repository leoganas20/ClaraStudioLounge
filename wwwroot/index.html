<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clara Studio Lounge | Wedding Photography & Coordination</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="ClaraStudioLounge.styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body>
    <div id="app">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f9f4ec; font-family: 'Playfair Display', serif;">
            <img src="images/logo.png" alt="Clara Studio Lounge" style="height: 60px; margin-bottom: 2rem; object-fit: contain;">
            <div class="loader"></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.setupScrollListener = (dotNetHelper) => {
            if (!window.scrollHelpers) window.scrollHelpers = [];
            window.scrollHelpers.push(dotNetHelper);
            
            if (!window.hasScrollListener) {
                window.addEventListener('scroll', () => {
                    window.scrollHelpers.forEach(helper => {
                        try {
                            helper.invokeMethodAsync('OnScroll', window.scrollY);
                        } catch (e) {
                            // Helper might be disposed
                        }
                    });
                });
                window.hasScrollListener = true;
            }
        };
    </script>
    <style>
        #blazor-error-ui {
            display: none !important;
        }
    </style>
    
    <style>
        .loader {
            width: 50px;
            height: 50px;
            border: 2px solid #ddd;
            border-top: 2px solid #c5a368;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</body>

</html>
